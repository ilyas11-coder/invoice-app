<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
body{ font-family:Arial,sans-serif; max-width:1000px; margin:auto; padding:20px; }
h1{ text-align:center; }
input{ width:100%; padding:8px; box-sizing:border-box; }
table{ width:100%; border-collapse:collapse; margin-top:15px; }
th,td{ border:1px solid #ddd; padding:8px; }
button{ padding:10px 15px; margin-top:10px; cursor:pointer; }
.summary{ margin-top:20px; font-size:18px; }
.remove-btn{ background:#d9534f; color:white; border:none; padding:5px 10px; }
.section{ margin-bottom:25px; }
</style>
</head>
<body>

<h1>Create Invoice</h1>

<div class="section">
    <h3>Company Information</h3>
    <input id="companyName" placeholder="Company Name"><br><br>
    <input id="companyIce" placeholder="ICE"><br><br>
    <input id="companyAddress" placeholder="Address"><br><br>
    <input id="companyContact" placeholder="Contact"><br>
    <button onclick="saveCompany()">Save Company Settings</button>
</div>

<div class="section">
    <h3>Customer Information</h3>
    <input list="customers" id="customer" placeholder="Customer Name">
    <datalist id="customers"></datalist><br><br>
    <input id="ice" placeholder="Customer ICE"><br><br>
    <input id="address" placeholder="Customer Address"><br><br>
    <input id="contact" placeholder="Customer Contact">
</div>

<h3>Products</h3>
<table id="productsTable">
    <thead>
        <tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th><th></th></tr>
    </thead>
    <tbody id="productsBody"></tbody>
</table>
<button onclick="addRow()">+ Add Product</button>

<div class="summary">
    <div>HT : <span id="subtotal">0.00</span> DH</div>
    <div>TVA (20%) : <span id="tax">0.00</span> DH</div>
    <div>TTC : <span id="total">0.00</span> DH</div>
</div>
<br>
<button onclick="generatePDF()">Generate PDF</button>

<script>
/* Functions (saveCompany, loadCompany, saveCustomer, loadCustomers, getInvoiceNumber, addRow, removeRow, updateTotals) remain the same as your original code */

function saveCompany(){
    const company = { name: document.getElementById("companyName").value, ice: document.getElementById("companyIce").value, address: document.getElementById("companyAddress").value, contact: document.getElementById("companyContact").value };
    localStorage.setItem("company", JSON.stringify(company));
    alert("Company information saved.");
}

function loadCompany(){
    const company = JSON.parse(localStorage.getItem("company"));
    if(!company) return;
    document.getElementById("companyName").value = company.name || "";
    document.getElementById("companyIce").value = company.ice || "";
    document.getElementById("companyAddress").value = company.address || "";
    document.getElementById("companyContact").value = company.contact || "";
}

function saveCustomer(){
    const customer = { name: document.getElementById("customer").value, ice: document.getElementById("ice").value, address: document.getElementById("address").value, contact: document.getElementById("contact").value };
    if(customer.name.trim() === "") return;
    let customers = JSON.parse(localStorage.getItem("customers")) || [];
    const exists = customers.some(c => c.name.toLowerCase() === customer.name.toLowerCase());
    if(!exists){ customers.push(customer); localStorage.setItem("customers", JSON.stringify(customers)); }
    loadCustomers();
}

function loadCustomers(){
    const list = document.getElementById("customers");
    list.innerHTML = "";
    const customers = JSON.parse(localStorage.getItem("customers")) || [];
    customers.forEach(c => { const option = document.createElement("option"); option.value = c.name; list.appendChild(option); });
}

document.getElementById("customer").addEventListener("change", function(){
    const selected = this.value;
    const customers = JSON.parse(localStorage.getItem("customers")) || [];
    const customer = customers.find(c => c.name === selected);
    if(!customer) return;
    document.getElementById("ice").value = customer.ice || "";
    document.getElementById("address").value = customer.address || "";
    document.getElementById("contact").value = customer.contact || "";
});

function getInvoiceNumber(){
    let last = parseInt(localStorage.getItem("lastInvoice") || "0");
    last++;
    localStorage.setItem("lastInvoice", last);
    return "INV-" + new Date().getFullYear() + "-" + String(last).padStart(4,"0");
}

function addRow(){
    const tbody = document.getElementById("productsBody");
    const row = document.createElement("tr");
    row.innerHTML = `<td><input class="product"></td><td><input type="number" class="qty" value="1" min="1" oninput="updateTotals()"></td><td><input type="number" class="price" value="0" step="0.01" oninput="updateTotals()"></td><td class="lineTotal">0.00</td><td><button class="remove-btn" onclick="removeRow(this)">X</button></td>`;
    tbody.appendChild(row);
    updateTotals();
}

function removeRow(btn){ btn.closest("tr").remove(); updateTotals(); }

function updateTotals(){
    let subtotal = 0;
    document.querySelectorAll("#productsBody tr").forEach(row => {
        const qty = Number(row.querySelector(".qty").value);
        const price = Number(row.querySelector(".price").value);
        const total = qty * price;
        row.querySelector(".lineTotal").innerText = total.toFixed(2);
        subtotal += total;
    });
    const tax = subtotal * 0.20;
    const grandTotal = subtotal + tax;
    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("tax").innerText = tax.toFixed(2);
    document.getElementById("total").innerText = grandTotal.toFixed(2);
}

function generatePDF(){
    saveCustomer();
    updateTotals();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const invoiceNo = getInvoiceNumber();
    const today = new Date().toLocaleDateString();
    const company = JSON.parse(localStorage.getItem("company")) || {};

    doc.setFontSize(18);
    doc.text("FACTURE", 105, 20, { align: "center" });
    doc.setFontSize(11);
    doc.text(company.name || "", 20, 55);
    doc.text("ICE : " + (company.ice || ""), 20, 63);
    doc.text("Adresse : " + (company.address || ""), 20, 71);
    doc.text("Contact : " + (company.contact || ""), 20, 79);
    doc.text("Facture N° : " + invoiceNo, 130, 55);
    doc.text("Date : " + today, 130, 63);
    doc.text("Client : " + document.getElementById("customer").value, 20, 95);
    doc.text("ICE : " + document.getElementById("ice").value, 20, 103);
    doc.text("Adresse : " + document.getElementById("address").value, 20, 111);
    doc.text("Contact : " + document.getElementById("contact").value, 20, 119);

    const rows = [];
    let subtotal = 0;
    document.querySelectorAll("#productsBody tr").forEach(row => {
        const product = row.querySelector(".product").value;
        const qty = Number(row.querySelector(".qty").value);
        const price = Number(row.querySelector(".price").value);
        const total = qty * price;
        subtotal += total;
        rows.push([product, qty, price.toFixed(2), total.toFixed(2)]);
    });

    doc.autoTable({ startY: 130, head: [["Produit", "Quantité", "Prix Unitaire", "Total HT"]], body: rows });

    const tax = subtotal * 0.20;
    const ttc = subtotal + tax;
    let y = doc.lastAutoTable.finalY + 15;
    doc.text("Montant HT : " + subtotal.toFixed(2) + " DH", 130, y);
    y += 10;
    doc.text("TVA (20%) : " + tax.toFixed(2) + " DH", 130, y);
    y += 10;
    doc.text("Montant TTC : " + ttc.toFixed(2) + " DH", 130, y);
    doc.save(`Facture-${invoiceNo}.pdf`);
}

loadCompany();
loadCustomers();
addRow();
</script>
</body>
</html>
